    /* ── Matchup Banner ── */
    .matchup-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 1.5rem 2rem;
      flex-wrap: wrap;
    }
    .mb-team {

      flex-direction: column;
      align-items: center;

    .mb-logo {

      background: var(--bg2);

    .bat-team .mb-logo { border-color: var(--accent2); box-shadow: 0 0 20px rgba(255,107,43,0.35); }

    .mb-name {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      color: var(--text2);
    }
    .mb-label {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.75rem;
      border-radius: 20px;
    }
    .mb-label.bat  { background: rgba(255,107,43,0.15); color: var(--accent2); border: 1px solid rgba(255,107,43,0.3); }

      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,229,255,0.5);
      animation: vsPulse 3s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes vsPulse {
      0%,100% { text-shadow: 0 0 15px rgba(0,229,255,0.4); }
      50%      { text-shadow: 0 0 35px rgba(0,229,255,0.8), 0 0 60px rgba(0,229,255,0.3); }

      position: relative;
      width: 100%;
      overflow: hidden;
      padding: 1.5rem 0 0.5rem;

      will-change: transform;

    .reel-card {
      flex-shrink: 0;
      width: 340px; height: 240px;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
      opacity: 0.5;
      transform: scale(0.9);
      border: 2px solid transparent;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);

      opacity: 1;
      transform: scale(1.02);
      border-color: var(--accent2);
      box-shadow: 0 0 40px rgba(255,107,43,0.4), 0 0 80px rgba(255,107,43,0.1), 0 8px 30px rgba(0,0,0,0.4);

      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, transparent 40%, rgba(0,0,0,0.15) 100%);
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.3s;

    .reel-card.active::before {
      opacity: 1;
    }

      width: 100%; height: 100%;

      transform: scale(1.02);
    }

      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.15) 100%);

      z-index: 1;

/* ── Floating Particles ── */
(function() {
  const canvas = document.getElementById('particlesCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];
  function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 50; i++) {
    particles.push({ x: Math.random()*w, y: Math.random()*h, vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3, r:Math.random()*1.5+0.5, a:Math.random()*0.35+0.08 });
  }
  function draw() {
    ctx.clearRect(0,0,w,h);
    particles.forEach(p => {
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=w; if(p.x>w)p.x=0; if(p.y<0)p.y=h; if(p.y>h)p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,229,255,${p.a})`; ctx.fill();
    });
    for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++) {
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<120){ ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.strokeStyle=`rgba(0,229,255,${0.05*(1-d/120)})`; ctx.lineWidth=0.5; ctx.stroke(); }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

  try {
    const res = await fetch(API + '/teams');
    const teams = await res.json(); // plain array
    const map = {};
    teams.forEach(t => { map[t.team_id] = t; });

    const bat  = map[state.battingTeam]  || {};
    const bowl = map[state.bowlingTeam] || {};

    const batImg = document.getElementById('batLogo');

    const bowlImg = document.getElementById('bowlLogo');

    bowlImg.onerror = () => {
      bowlImg.onerror = null;
      bowlImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(bowl.short_name||'BWL')}&background=1a0533&color=7c3aed&size=72&bold=true&rounded=true`;
    };
    document.getElementById('bowlName').textContent = bowl.team_name || 'Bowling Team';
  } catch (_) {
    document.getElementById('batName').textContent  = 'Batting Team';
    document.getElementById('bowlName').textContent = 'Bowling Team';
  }
}

/* ── Try to enrich from API ── */
async function loadVenuesFromAPI() {
  try {
    const res = await fetch(API + '/venues');
    const data = await res.json();
    if (Array.isArray(data) && data.length) {
      // Merge API data with static (API may have more accurate avg_score / pitch_type)
      allVenues = data.map(apiV => {
        const stat = VENUES_STATIC.find(s => s.venue_id === apiV.venue_id) || {};
        return { ...stat, ...apiV, capacity: stat.capacity || '—' };
      });
      filteredVenues = [...allVenues];
    }
  } catch (_) { /* use static data */ }
}

/* ── Image loading (local assets) ── */
function setCardImage(img, venueId, venueName) {
  const imagePath = VENUE_IMAGES[venueId];
  
  if (imagePath) {
    img.src = imagePath;
    img.onerror = () => {
      // If local image fails, show placeholder
      img.replaceWith(makePlaceholder(venueName));
    };
  } else {
    // No image mapped, show placeholder
    img.replaceWith(makePlaceholder(venueName));
  }
}

/* ── Reel Builder ── */
function buildReel() {
  const track = document.getElementById('reelTrack');
  const dots  = document.getElementById('reelDots');
  track.innerHTML = '';
  dots.innerHTML  = '';

  if (!filteredVenues.length) {
    track.innerHTML = '<div class="no-results">No stadiums match your search.</div>';
    document.getElementById('venueInfoCard').style.opacity = '0.4';
    return;
  }
  document.getElementById('venueInfoCard').style.opacity = '1';

  filteredVenues.forEach((v, i) => {
    // Card
    const card = document.createElement('div');
    card.className = 'reel-card' + (i === currentIndex ? ' active' : '');
    card.dataset.index = i;
    card.onclick = () => goTo(i);

    const img = document.createElement('img');
    img.alt = v.venue_name;
    setCardImage(img, v.venue_id, v.venue_name);
    card.appendChild(img);

    const overlay = document.createElement('div');
    overlay.className = 'reel-card-overlay';
    overlay.innerHTML = `<div class="reel-card-name">${v.venue_name}</div><div class="reel-card-city">&#128205; ${v.city}</div>`;
    card.appendChild(overlay);
    track.appendChild(card);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'reel-dot' + (i === currentIndex ? ' active' : '');
    dot.onclick = () => goTo(i);
    dots.appendChild(dot);
  });

  positionReel();
}

function makePlaceholder(name) {
  const div = document.createElement('div');
  div.className = 'reel-card-placeholder';
  div.innerHTML = `<div class="ph-icon">&#127967;</div><div class="ph-name">${name}</div>`;
  return div;
}

function positionReel() {
  const track = document.getElementById('reelTrack');
  const cardW = 340;
  const gap   = 24;
  const offset = currentIndex * (cardW + gap);
  track.style.transform = `translateX(-${offset}px)`;
}

/* ── Navigation ── */
function goTo(index) {
  if (!filteredVenues.length) return;
  currentIndex = ((index % filteredVenues.length) + filteredVenues.length) % filteredVenues.length;

  document.querySelectorAll('.reel-card').forEach((c, i) => c.classList.toggle('active', i === currentIndex));
  document.querySelectorAll('.reel-dot').forEach((d, i)  => d.classList.toggle('active', i === currentIndex));

  positionReel();
  updateInfoCard(filteredVenues[currentIndex]);
  syncDropdown();
}

/* ── Info Card ── */
function updateInfoCard(v) {
  const card = document.getElementById('venueInfoCard');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';

  document.getElementById('vicName').textContent     = v.venue_name;
  document.getElementById('vicCity').textContent     = `&#128205; ${v.city}`;
  document.getElementById('vicAvg').textContent      = `${v.avg_score} runs`;
  document.getElementById('vicCapacity').textContent = v.capacity || '—';

  const badge = document.getElementById('vicPitchBadge');
  badge.textContent = (v.pitch_type || 'Balanced') + ' Pitch';
  badge.className   = 'pitch-badge pitch-' + (v.pitch_type || 'Balanced');
}

/* ── Search ── */
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  filteredVenues = q
    ? allVenues.filter(v => v.venue_name.toLowerCase().includes(q) || v.city.toLowerCase().includes(q))
    : [...allVenues];
  currentIndex = 0;
  buildReel();
  if (filteredVenues.length) updateInfoCard(filteredVenues[0]);
});

/* ── Dropdown ── */
function buildDropdown() {
  const sel = document.getElementById('venueDropdown');
  allVenues.forEach(v => {
    const opt = document.createElement('option');
    opt.value       = v.venue_id;
    opt.textContent = `${v.venue_name} — ${v.city}`;
    sel.appendChild(opt);
  });
}

document.getElementById('venueDropdown').addEventListener('change', function() {
  const id = this.value;
  if (!id) return;
  document.getElementById('searchInput').value = '';
  filteredVenues = [...allVenues];
  const idx = filteredVenues.findIndex(v => v.venue_id === id);
  if (idx !== -1) { buildReel(); goTo(idx); }
});

function syncDropdown() {
  const v = filteredVenues[currentIndex];
  if (v) document.getElementById('venueDropdown').value = v.venue_id;
}

/* ── Select Venue ── */
function selectVenue() {
  if (!filteredVenues.length) return;
  const v = filteredVenues[currentIndex];
  
  console.log('Saving venue:', v);
  
  saveState({
    ...state,
    venueId: v.venue_id,
    venueName: v.venue_name,
    pitchType: v.pitch_type,
    venueData: v
  });
  
  console.log('State saved, redirecting to summary.html');
  window.location.href = 'summary.html';
}

/* ── Arrow buttons ── */
document.getElementById('arrowLeft').onclick  = () => goTo(currentIndex - 1);
document.getElementById('arrowRight').onclick = () => goTo(currentIndex + 1);

/* ── Keyboard ── */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowLeft')  goTo(currentIndex - 1);
  if (e.key === 'ArrowRight') goTo(currentIndex + 1);
  if (e.key === 'Enter')      selectVenue();
});

/* ── Init ── */
async function init() {
  await loadVenuesFromAPI();

  if (state.venueId) {
    const idx = allVenues.findIndex(v => v.venue_id === state.venueId);
    if (idx !== -1) currentIndex = idx;
  }

  buildDropdown();
  buildReel();
  if (filteredVenues.length) updateInfoCard(filteredVenues[currentIndex]);
  syncDropdown();

  loadTeams(); // non-blocking
}

init();
</script>
</body>
</html>
